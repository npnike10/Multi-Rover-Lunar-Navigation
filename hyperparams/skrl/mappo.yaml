# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -2.0
    network:
      - name: net
        input: STATES
        layers: [256, 256, 256]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: SHARED_STATES
        layers: [256, 256, 256]
        activations: elu
    output: ONE

# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: 256  # Defines the rollout length before a PPO update

# https://skrl.readthedocs.io/en/latest/api/agents/mappo.html
agent:
  class: MAPPO
  # Removing hyperparameter overrides (learning_rate, rollouts, mini_batches, etc.) 
  # so that SKRL falls back to its MAPPO_DEFAULT_CONFIG.
  
  # Standardizing states and values is common for MAPPO
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  shared_state_preprocessor: RunningStandardScaler
  shared_state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  
  experiment:
    directory: "MISSING"
    experiment_name: "MISSING"
    write_interval: auto
    checkpoint_interval: 1000
    wandb: True
    wandb_kwargs:
      project: "Multi-Rover-Lunar-Navigation"
      entity: "niket-parikh-lira"

# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 50000000
  environment_info: log
